<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" role="img" aria-labelledby="title desc">
  <title id="title">Q 值从终点向起点传播</title>
  <desc id="desc">在 4×4 GridWorld 的最短路径上，靠近终点的动作价值先稳定，然后通过 TD 更新逐步传播到更早的状态。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="start" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="goal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="940" height="430" rx="18" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="24" font-weight="700" fill="#0f172a">TD 信息像波一样从终点往回传</text>
  <text x="40" y="74" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#475569">当后一个动作的 Q 值更准时，前一个动作的 TD Target 也会更准。</text>

  <g transform="translate(58 116)" filter="url(#shadow)" font-family="Arial, 'Noto Sans SC', sans-serif">
    <rect x="-18" y="-18" width="356" height="326" rx="16" fill="#ffffff"/>

    <rect x="0" y="0" width="76" height="62" rx="8" fill="url(#start)"/>
    <text x="38" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">S</text>
    <text x="38" y="47" text-anchor="middle" font-size="13" fill="#eff6ff">→ -4.686</text>

    <rect x="82" y="0" width="76" height="62" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <text x="120" y="27" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">→ -4.095</text>
    <rect x="164" y="0" width="76" height="62" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <text x="202" y="27" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">→ -3.439</text>
    <rect x="246" y="0" width="76" height="62" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <text x="284" y="27" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">↓ -2.710</text>

    <rect x="0" y="68" width="76" height="62" rx="8" fill="#f1f5f9"/>
    <rect x="82" y="68" width="76" height="62" rx="8" fill="#f1f5f9"/>
    <rect x="164" y="68" width="76" height="62" rx="8" fill="#f1f5f9"/>
    <rect x="246" y="68" width="76" height="62" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <text x="284" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">↓ -1.900</text>

    <rect x="0" y="136" width="76" height="62" rx="8" fill="#f1f5f9"/>
    <rect x="82" y="136" width="76" height="62" rx="8" fill="#f1f5f9"/>
    <rect x="164" y="136" width="76" height="62" rx="8" fill="#f1f5f9"/>
    <rect x="246" y="136" width="76" height="62" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
    <text x="284" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">↓ -1.000</text>

    <rect x="0" y="204" width="76" height="62" rx="8" fill="#f1f5f9"/>
    <rect x="82" y="204" width="76" height="62" rx="8" fill="#f1f5f9"/>
    <rect x="164" y="204" width="76" height="62" rx="8" fill="#f1f5f9"/>
    <rect x="246" y="204" width="76" height="62" rx="8" fill="url(#goal)"/>
    <text x="284" y="243" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">G</text>
  </g>

  <g transform="translate(446 116)" font-family="Arial, 'Noto Sans SC', sans-serif">
    <rect x="0" y="0" width="430" height="96" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="24" y="32" font-size="17" font-weight="700" fill="#1d4ed8">离终点 1 步</text>
    <text x="24" y="64" font-size="15" fill="#334155">Q((2,3), 下) = -1</text>

    <rect x="0" y="116" width="430" height="96" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="24" y="148" font-size="17" font-weight="700" fill="#0f172a">离终点 2 步</text>
    <text x="24" y="180" font-size="15" fill="#334155">Q((1,3), 下) = -1 + 0.9 × (-1) = -1.9</text>

    <rect x="0" y="232" width="430" height="96" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="24" y="264" font-size="17" font-weight="700" fill="#0f172a">继续向前传播</text>
    <text x="24" y="296" font-size="15" fill="#334155">Q((0,0), 右) ≈ -4.686，正好是最短 6 步回报。</text>
  </g>
</svg>
