      <rect x="0" y="90" width="28" height="28" rx="4" fill="url(#start)"/>
      <text x="14" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">S</text>
      <rect x="30" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
