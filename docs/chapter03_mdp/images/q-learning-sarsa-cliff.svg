      <text x="178" y="50" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">→ → → → → → → → → →</text>

      <rect x="0" y="60" width="28" height="28" rx="4" fill="#dcfce7"/>
      <text x="14" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">↑</text>
      <rect x="30" y="60" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="60" y="60" width="28" height="28" rx="4" fill="#f1f5f9"/>
