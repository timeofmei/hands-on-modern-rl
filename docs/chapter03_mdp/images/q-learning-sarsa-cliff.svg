      <rect x="300" y="60" width="28" height="28" rx="4" fill="#dbeafe"/>
      <rect x="330" y="60" width="28" height="28" rx="4" fill="#dbeafe"/>
      <text x="178" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">→ → → → → → → → → →</text>

      <rect x="0" y="90" width="28" height="28" rx="4" fill="url(#start)"/>
      <text x="14" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">S</text>
      <rect x="30" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
      <rect x="60" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
      <rect x="90" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
      <rect x="120" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
