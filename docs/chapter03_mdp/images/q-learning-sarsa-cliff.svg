      <rect x="330" y="30" width="28" height="28" rx="4" fill="#f1f5f9"/>

      <rect x="0" y="60" width="28" height="28" rx="4" fill="#dbeafe"/>
      <text x="14" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">↑</text>
      <rect x="30" y="60" width="28" height="28" rx="4" fill="#dbeafe"/>
      <rect x="60" y="60" width="28" height="28" rx="4" fill="#dbeafe"/>
      <rect x="90" y="60" width="28" height="28" rx="4" fill="#dbeafe"/>
