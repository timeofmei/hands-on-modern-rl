      <text x="14" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">↑</text>
      <rect x="30" y="30" width="28" height="28" rx="4" fill="#dcfce7"/>
      <rect x="60" y="30" width="28" height="28" rx="4" fill="#dcfce7"/>
      <rect x="90" y="30" width="28" height="28" rx="4" fill="#dcfce7"/>
      <rect x="120" y="30" width="28" height="28" rx="4" fill="#dcfce7"/>
