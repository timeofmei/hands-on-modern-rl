      <rect x="240" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="270" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="300" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="330" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>

      <rect x="0" y="30" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="30" y="30" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="60" y="30" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="90" y="30" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="120" y="30" width="28" height="28" rx="4" fill="#f1f5f9"/>
