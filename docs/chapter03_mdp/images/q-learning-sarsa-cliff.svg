<svg xmlns="http://www.w3.org/2000/svg" width="940" height="470" viewBox="0 0 940 470" role="img" aria-labelledby="title desc">
  <title id="title">Q-Learning 与 SARSA 在悬崖行走中的路径差异</title>
  <desc id="desc">4×12 Cliff Walking 网格中，Q-Learning 倾向于学习贴近悬崖的最短路径，SARSA 在有探索噪声时倾向于学习更安全的绕远路径。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="start" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="goal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="940" height="470" rx="18" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="24" font-weight="700" fill="#0f172a">一个 max，让两种算法走出不同性格</text>
  <text x="40" y="74" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#475569">Q-Learning 学理想最优；SARSA 学当前带探索策略的实际价值。</text>

  <g transform="translate(54 118)" font-family="Arial, 'Noto Sans SC', sans-serif" filter="url(#shadow)">
    <rect x="-18" y="-34" width="392" height="326" rx="16" fill="#ffffff"/>
    <text x="0" y="-8" font-size="17" font-weight="700" fill="#1d4ed8">Q-Learning：贴着悬崖的最短路</text>
    <g>
      <rect x="0" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="30" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="60" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="90" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="120" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="150" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
      <rect x="180" y="0" width="28" height="28" rx="4" fill="#f1f5f9"/>
