    <text x="0" y="160" font-size="14" fill="#334155">目标里使用实际下一步动作 a′。</text>
    <text x="0" y="188" font-size="14" fill="#334155">它把 ε-greedy 的随机走偏风险也算进价值估计里。</text>
  </g>
