      <rect x="180" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
      <rect x="210" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
      <rect x="240" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
      <rect x="270" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
      <rect x="300" y="90" width="28" height="28" rx="4" fill="#fecaca"/>
      <rect x="330" y="90" width="28" height="28" rx="4" fill="url(#goal)"/>
      <text x="344" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">G</text>
    </g>
    <text x="0" y="160" font-size="14" fill="#334155">目标里使用 max，假设未来一直贪婪选择。</text>
    <text x="0" y="188" font-size="14" fill="#334155">训练后若不再探索，这条路最短；训练中探索会带来掉崖风险。</text>
  </g>

  <g transform="translate(516 118)" font-family="Arial, 'Noto Sans SC', sans-serif" filter="url(#shadow)">
    <rect x="-18" y="-34" width="392" height="326" rx="16" fill="#ffffff"/>
    <text x="0" y="-8" font-size="17" font-weight="700" fill="#15803d">SARSA：考虑探索风险的安全路</text>
