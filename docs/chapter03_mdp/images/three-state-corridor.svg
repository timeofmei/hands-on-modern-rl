<svg xmlns="http://www.w3.org/2000/svg" width="560" height="120" viewBox="0 0 560 120" role="img" aria-labelledby="title desc">
  <title id="title">三格走廊 MDP</title>
  <desc id="desc">从状态 S 到 M，再到终点 G。每一步奖励为 -1。</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <g font-family="Arial, 'Noto Sans SC', sans-serif">
    <circle cx="80" cy="60" r="30" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="80" y="68" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">S</text>

    <line x1="112" y1="60" x2="228" y2="60" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="170" y="45" text-anchor="middle" font-size="16" fill="#334155">-1</text>

    <circle cx="260" cy="60" r="30" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="260" y="68" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">M</text>

    <line x1="292" y1="60" x2="408" y2="60" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="350" y="45" text-anchor="middle" font-size="16" fill="#334155">-1</text>

    <circle cx="440" cy="60" r="30" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="440" y="68" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">G</text>
  </g>
</svg>
