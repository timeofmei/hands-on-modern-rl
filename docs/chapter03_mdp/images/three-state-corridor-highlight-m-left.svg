<svg xmlns="http://www.w3.org/2000/svg" width="680" height="190" viewBox="0 0 680 190" role="img" aria-labelledby="title desc">
  <title id="title">高亮 M 左走分支</title>
  <desc id="desc">三格走廊中高亮从 M 左走回到 S 的分支，概率 0.2，奖励 -2。</desc>

  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <g font-family="Arial, 'Noto Sans SC', sans-serif">
    <text x="340" y="28" text-anchor="middle" font-size="15" fill="#475569">高亮：M 左走回 S，p=0.2，r=-2</text>

    <circle cx="120" cy="100" r="30" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="120" y="108" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">S</text>
    <circle cx="330" cy="100" r="30" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="330" y="108" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">M</text>
    <circle cx="540" cy="100" r="30" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="540" y="108" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">G</text>

    <path d="M 152 84 C 205 54 245 54 298 84" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <text x="225" y="58" text-anchor="middle" font-size="14" fill="#64748b">右走 p=0.8, r=-1</text>
    <path d="M 362 100 L 508 100" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <text x="435" y="88" text-anchor="middle" font-size="14" fill="#64748b">右走 p=0.8, r=-1</text>
    <path d="M 92 94 C 42 76 42 124 92 106" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <text x="54" y="70" text-anchor="middle" font-size="14" fill="#64748b">左走 p=0.2</text>
    <text x="54" y="88" text-anchor="middle" font-size="14" fill="#64748b">r=-2</text>

    <path d="M 298 116 C 245 146 205 146 152 116" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow-blue)"/>
    <text x="225" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">M 左走 p=0.2, r=-2</text>
  </g>
</svg>
