<svg xmlns="http://www.w3.org/2000/svg" width="940" height="520" viewBox="0 0 940 520" role="img" aria-labelledby="title desc">
  <title id="title">GridWorld 中不同路径的折扣回报对比</title>
  <desc id="desc">4×4 GridWorld 从左上角起点到右下角终点。最短路径 6 步，绕远路径 8 步，乱走路径 10 步；每步奖励为 -1，折扣因子为 0.9。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="start" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="goal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <rect width="940" height="520" rx="18" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="24" font-weight="700" fill="#0f172a">同一个终点，不同路径有不同回报</text>
  <text x="40" y="74" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#475569">每走一步得到 r=-1，折扣因子 γ=0.9；Q 表最终要学会的是“少走弯路更值钱”。</text>

  <g transform="translate(48 112)" filter="url(#shadow)">
    <rect x="-18" y="-18" width="358" height="356" rx="16" fill="#ffffff"/>
    <text x="0" y="-34" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" font-weight="700" fill="#0f172a">最短路径：右、右、右、下、下、下</text>

    <g font-family="Arial, 'Noto Sans SC', sans-serif">
      <rect x="0" y="0" width="72" height="72" rx="8" fill="url(#start)"/>
      <text x="36" y="29" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">S</text>
      <text x="36" y="54" text-anchor="middle" font-size="15" fill="#eff6ff">1 →</text>

      <rect x="78" y="0" width="72" height="72" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <text x="114" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">2 →</text>
      <rect x="156" y="0" width="72" height="72" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <text x="192" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">3 →</text>
      <rect x="234" y="0" width="72" height="72" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <text x="270" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">4 ↓</text>

      <rect x="0" y="78" width="72" height="72" rx="8" fill="#f1f5f9"/>
      <rect x="78" y="78" width="72" height="72" rx="8" fill="#f1f5f9"/>
      <rect x="156" y="78" width="72" height="72" rx="8" fill="#f1f5f9"/>
      <rect x="234" y="78" width="72" height="72" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <text x="270" y="110" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">5 ↓</text>

      <rect x="0" y="156" width="72" height="72" rx="8" fill="#f1f5f9"/>
      <rect x="78" y="156" width="72" height="72" rx="8" fill="#f1f5f9"/>
      <rect x="156" y="156" width="72" height="72" rx="8" fill="#f1f5f9"/>
      <rect x="234" y="156" width="72" height="72" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
      <text x="270" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">6 ↓</text>

      <rect x="0" y="234" width="72" height="72" rx="8" fill="#f1f5f9"/>
      <rect x="78" y="234" width="72" height="72" rx="8" fill="#f1f5f9"/>
      <rect x="156" y="234" width="72" height="72" rx="8" fill="#f1f5f9"/>
      <rect x="234" y="234" width="72" height="72" rx="8" fill="url(#goal)"/>
      <text x="270" y="278" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">G</text>
    </g>
  </g>

  <g transform="translate(430 120)" font-family="Arial, 'Noto Sans SC', sans-serif">
    <rect x="0" y="0" width="455" height="86" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="24" y="30" font-size="17" font-weight="700" fill="#1d4ed8">路径 A：最短路</text>
    <text x="24" y="58" font-size="15" fill="#334155">动作序列 R R R D D D，6 步</text>
    <text x="304" y="49" font-size="18" font-weight="700" fill="#1d4ed8">G₀ = -4.686</text>

    <rect x="0" y="108" width="455" height="86" rx="12" fill="#fffbeb" stroke="#fde68a"/>
    <text x="24" y="138" font-size="17" font-weight="700" fill="#b45309">路径 B：绕远路</text>
    <text x="24" y="166" font-size="15" fill="#334155">动作序列 R D L D D R R R，8 步</text>
    <text x="304" y="157" font-size="18" font-weight="700" fill="#b45309">G₀ = -5.695</text>

    <rect x="0" y="216" width="455" height="86" rx="12" fill="#fdf2f8" stroke="#fbcfe8"/>
    <text x="24" y="246" font-size="17" font-weight="700" fill="#be185d">路径 C：乱走</text>
    <text x="24" y="274" font-size="15" fill="#334155">动作序列 R R D L L D R D R R，10 步</text>
    <text x="304" y="265" font-size="18" font-weight="700" fill="#be185d">G₀ = -6.513</text>
  </g>

  <g transform="translate(430 444)" font-family="Arial, 'Noto Sans SC', sans-serif">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#0f172a">计算方式</text>
    <text x="0" y="28" font-size="15" fill="#334155">6 步最短路：G₀ = -(1 + 0.9 + 0.9² + 0.9³ + 0.9⁴ + 0.9⁵) = -4.686</text>
  </g>
</svg>
