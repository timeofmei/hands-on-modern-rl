<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <g font-family="Arial, 'Noto Sans SC', sans-serif">
    <!-- Grid lines -->
    <g stroke="#94a3b8" stroke-width="1">
      <line x1="80" y1="20" x2="80" y2="380"/>
      <line x1="170" y1="20" x2="170" y2="380"/>
      <line x1="260" y1="20" x2="260" y2="380"/>
      <line x1="350" y1="20" x2="350" y2="380"/>
      <line x1="20" y1="80" x2="380" y2="80"/>
      <line x1="20" y1="170" x2="380" y2="170"/>
      <line x1="20" y1="260" x2="380" y2="260"/>
      <line x1="20" y1="350" x2="380" y2="350"/>
    </g>
    <!-- Border -->
    <rect x="20" y="20" width="360" height="360" fill="none" stroke="#334155" stroke-width="2"/>

    <!-- Highlight (0,0) cell -->
    <rect x="20" y="20" width="90" height="90" fill="#fef3c7" stroke="#334155" stroke-width="2"/>
    <text x="65" y="55" text-anchor="middle" font-size="11" fill="#92400e">(0,0)</text>
    <text x="65" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">起点</text>
    <text x="65" y="100" text-anchor="middle" font-size="10" fill="#b45309">旧 Q=0</text>

    <!-- Highlight (0,1) cell -->
    <rect x="110" y="20" width="90" height="90" fill="#dbeafe" stroke="#334155" stroke-width="2"/>
    <text x="155" y="55" text-anchor="middle" font-size="11" fill="#1e40af">(0,1)</text>
    <text x="155" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">s'</text>
    <text x="155" y="100" text-anchor="middle" font-size="10" fill="#2563eb">max Q=0</text>

    <!-- Arrow from (0,0) to (0,1) -->
    <path d="M 95 65 L 115 65" fill="none" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowhead)"/>
    <text x="105" y="55" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">→</text>

    <!-- r = -1 label on the arrow -->
    <rect x="88" y="68" width="34" height="16" rx="3" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="105" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">r=-1</text>

    <!-- Goal cell (3,3) -->
    <rect x="290" y="290" width="90" height="90" fill="#dcfce7" stroke="#334155" stroke-width="2"/>
    <text x="335" y="325" text-anchor="middle" font-size="11" fill="#166534">(3,3)</text>
    <text x="335" y="350" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">G</text>

    <!-- Other cell labels (dimmed) -->
    <text x="245" y="55" text-anchor="middle" font-size="10" fill="#cbd5e1">(0,2)</text>
    <text x="335" y="55" text-anchor="middle" font-size="10" fill="#cbd5e1">(0,3)</text>
    <text x="65" y="145" text-anchor="middle" font-size="10" fill="#cbd5e1">(1,0)</text>
    <text x="155" y="145" text-anchor="middle" font-size="10" fill="#cbd5e1">(1,1)</text>
    <text x="245" y="145" text-anchor="middle" font-size="10" fill="#cbd5e1">(1,2)</text>
    <text x="335" y="145" text-anchor="middle" font-size="10" fill="#cbd5e1">(1,3)</text>
    <text x="65" y="235" text-anchor="middle" font-size="10" fill="#cbd5e1">(2,0)</text>
    <text x="155" y="235" text-anchor="middle" font-size="10" fill="#cbd5e1">(2,1)</text>
    <text x="245" y="235" text-anchor="middle" font-size="10" fill="#cbd5e1">(2,2)</text>
    <text x="335" y="235" text-anchor="middle" font-size="10" fill="#cbd5e1">(2,3)</text>
    <text x="65" y="325" text-anchor="middle" font-size="10" fill="#cbd5e1">(3,0)</text>
    <text x="155" y="325" text-anchor="middle" font-size="10" fill="#cbd5e1">(3,1)</text>
    <text x="245" y="325" text-anchor="middle" font-size="10" fill="#cbd5e1">(3,2)</text>
  </g>
</svg>
