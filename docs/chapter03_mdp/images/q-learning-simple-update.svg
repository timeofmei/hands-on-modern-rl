<svg xmlns="http://www.w3.org/2000/svg" width="500" height="150" viewBox="0 0 500 150">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <g font-family="Arial, 'Noto Sans SC', sans-serif">
    <circle cx="120" cy="75" r="30" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="120" y="70" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">(0,0)</text>
    <text x="120" y="90" text-anchor="middle" font-size="12" fill="#475569">旧 Q=0</text>

    <circle cx="380" cy="75" r="30" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <text x="380" y="70" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">(0,1)</text>
    <text x="380" y="90" text-anchor="middle" font-size="12" fill="#475569">max Q=0</text>

    <path d="M 150 75 L 350 75" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="250" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">向右走, r = -1</text>
  </g>
