<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Left: GridWorld -->
  <rect x="10" y="10" width="300" height="300" fill="#f5f5f5" stroke="#ccc" rx="4"/>
  <text x="160" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">GridWorld (4×4)</text>

  <!-- Grid cells -->
  <!-- Row 0 -->
  <rect x="40" y="50" width="60" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="70" y="85" text-anchor="middle" font-size="16" font-weight="bold" fill="#1976d2">S</text>
  <rect x="100" y="50" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="130" y="85" text-anchor="middle" font-size="13" fill="#666">(0,1)</text>
  <rect x="160" y="50" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="190" y="85" text-anchor="middle" font-size="13" fill="#666">(0,2)</text>
  <rect x="220" y="50" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="250" y="85" text-anchor="middle" font-size="13" fill="#666">(0,3)</text>

  <!-- Row 1 -->
  <rect x="40" y="110" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="70" y="145" text-anchor="middle" font-size="13" fill="#666">(1,0)</text>
  <rect x="100" y="110" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="130" y="145" text-anchor="middle" font-size="13" fill="#666">(1,1)</text>
  <rect x="160" y="110" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="190" y="145" text-anchor="middle" font-size="13" fill="#666">(1,2)</text>
  <rect x="220" y="110" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="250" y="145" text-anchor="middle" font-size="13" fill="#666">(1,3)</text>

  <!-- Row 2 -->
  <rect x="40" y="170" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="70" y="205" text-anchor="middle" font-size="13" fill="#666">(2,0)</text>
  <rect x="100" y="170" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="130" y="205" text-anchor="middle" font-size="13" fill="#666">(2,1)</text>
  <rect x="160" y="170" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="190" y="205" text-anchor="middle" font-size="13" fill="#666">(2,2)</text>
  <rect x="220" y="170" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="250" y="205" text-anchor="middle" font-size="13" fill="#666">(2,3)</text>

  <!-- Row 3 -->
  <rect x="40" y="230" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="70" y="265" text-anchor="middle" font-size="13" fill="#666">(3,0)</text>
  <rect x="100" y="230" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="130" y="265" text-anchor="middle" font-size="13" fill="#666">(3,1)</text>
  <rect x="160" y="230" width="60" height="60" fill="#fff" stroke="#bbb"/>
  <text x="190" y="265" text-anchor="middle" font-size="13" fill="#666">(3,2)</text>
  <rect x="220" y="230" width="60" height="60" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="250" y="265" text-anchor="middle" font-size="16" font-weight="bold" fill="#388e3c">G</text>

  <!-- Arrow from grid to Q-table -->
  <line x1="290" y1="160" x2="340" y2="160" stroke="#f57c00" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f57c00"/>
    </marker>
  </defs>
  <text x="315" y="148" text-anchor="middle" font-size="11" fill="#f57c00" font-weight="bold">查表</text>

  <!-- Right: Q-table -->
  <rect x="350" y="10" width="360" height="300" fill="#fff3e0" stroke="#f57c00" rx="4"/>
  <text x="530" y="36" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Q 表：16 个状态 × 4 个动作 = 64 个值</text>

  <!-- Q-table representation as a grid of small cells -->
  <text x="390" y="62" font-size="11" fill="#888">状态 \ 动作</text>

  <!-- Header row -->
  <rect x="390" y="70" width="50" height="24" fill="#ffcc80" stroke="#f57c00"/>
  <text x="415" y="87" text-anchor="middle" font-size="10" fill="#333">s \ a</text>
  <rect x="440" y="70" width="44" height="24" fill="#fff3e0" stroke="#f57c00"/>
  <text x="462" y="87" text-anchor="middle" font-size="12" fill="#333">↑</text>
  <rect x="484" y="70" width="44" height="24" fill="#fff3e0" stroke="#f57c00"/>
  <text x="506" y="87" text-anchor="middle" font-size="12" fill="#333">→</text>
  <rect x="528" y="70" width="44" height="24" fill="#fff3e0" stroke="#f57c00"/>
  <text x="550" y="87" text-anchor="middle" font-size="12" fill="#333">↓</text>
  <rect x="572" y="70" width="44" height="24" fill="#fff3e0" stroke="#f57c00"/>
  <text x="594" y="87" text-anchor="middle" font-size="12" fill="#333">←</text>

  <!-- Data rows (show first few, then ellipsis, then last) -->
  <rect x="390" y="94" width="50" height="20" fill="#fff" stroke="#ddd"/>
  <text x="415" y="108" text-anchor="middle" font-size="10" fill="#1976d2">S</text>
  <rect x="440" y="94" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="462" y="108" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="484" y="94" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="506" y="108" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="528" y="94" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="550" y="108" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="572" y="94" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="594" y="108" text-anchor="middle" font-size="10" fill="#999">0.0</text>

  <rect x="390" y="114" width="50" height="20" fill="#fff" stroke="#ddd"/>
  <text x="415" y="128" text-anchor="middle" font-size="10" fill="#666">(0,1)</text>
  <rect x="440" y="114" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="462" y="128" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="484" y="114" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="506" y="128" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="528" y="114" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="550" y="128" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="572" y="114" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="594" y="128" text-anchor="middle" font-size="10" fill="#999">0.0</text>

  <rect x="390" y="134" width="50" height="20" fill="#fff" stroke="#ddd"/>
  <text x="415" y="148" text-anchor="middle" font-size="10" fill="#666">(0,2)</text>
  <rect x="440" y="134" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="462" y="148" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="484" y="134" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="506" y="148" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="528" y="134" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="550" y="148" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="572" y="134" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="594" y="148" text-anchor="middle" font-size="10" fill="#999">0.0</text>

  <!-- Ellipsis -->
  <text x="551" y="172" text-anchor="middle" font-size="16" fill="#999">⋮</text>

  <!-- Last row: G -->
  <rect x="390" y="186" width="50" height="20" fill="#fff" stroke="#ddd"/>
  <text x="415" y="200" text-anchor="middle" font-size="10" fill="#388e3c">G</text>
  <rect x="440" y="186" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="462" y="200" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="484" y="186" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="506" y="200" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="528" y="186" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="550" y="200" text-anchor="middle" font-size="10" fill="#999">0.0</text>
  <rect x="572" y="186" width="44" height="20" fill="#fff" stroke="#ddd"/>
  <text x="594" y="200" text-anchor="middle" font-size="10" fill="#999">0.0</text>

  <!-- Description below Q-table -->
  <text x="530" y="230" text-anchor="middle" font-size="11" fill="#e65100">每个格子存一个数，一共 64 个数</text>

  <!-- Highlight annotation on one cell -->
  <rect x="484" y="114" width="44" height="20" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5" rx="2"/>
  <text x="506" y="128" text-anchor="middle" font-size="10" fill="#2e7d32">-0.1</text>

  <line x1="530" y1="134" x2="530" y2="250" stroke="#388e3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="530" y="264" text-anchor="middle" font-size="10" fill="#2e7d32">走一步，只改一个数</text>

  <!-- Bottom formula reminder -->
  <text x="530" y="295" text-anchor="middle" font-size="11" fill="#999">Q(s,a) ← Q(s,a) + α[r + γ·max Q(s',a') − Q(s,a)]</text>
</svg>
